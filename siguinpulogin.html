<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Authentication</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: radial-gradient(circle at top right, #1e1b4b, #090514);
            
            overflow-x: hidden;
            overflow-y: auto;

            min-height: 100vh;
            padding: 20px 0;
        }

        /* Glassmorphism Effect */
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* Smooth Custom Transitions */
        .page-transition {
            transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        /* Ambient Background Glows */
        .glow-1 {
            background: linear-gradient(135deg, #6366f1, #a855f7);
            filter: blur(120px);
            opacity: 0.2;
        }
        .glow-2 {
            background: linear-gradient(135deg, #3b82f6, #ec4899);
            filter: blur(120px);
            opacity: 0.15;
        }

        /* Professional Spinner */
        .loader-ring {
            border-right-color: #6366f1;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .hidden-card {
            opacity: 0;
            transform: scale(0.95) translateY(20px);
            pointer-events: none;
            position: absolute;
        }
    </style>
</head>
<body class="relative min-h-screen flex items-center justify-center text-slate-200 p-4">

    <div class="absolute top-1/4 left-1/4 w-96 h-96 glow-1 rounded-full pointer-events-none"></div>
    <div class="absolute bottom-1/4 right-1/4 w-96 h-96 glow-2 rounded-full pointer-events-none"></div>

    <div class="relative w-full max-w-md min-h-[600px] flex items-center justify-center">
        
        <div id="loadingOverlay" class="absolute inset-0 glass-card rounded-2xl z-50 flex flex-col items-center justify-center opacity-0 pointer-events-none transition-opacity duration-300">
            <div class="relative w-16 h-16">
                <div class="absolute inset-0 rounded-full border-4 border-t-transparent border-slate-700/50"></div>
                <div class="absolute inset-0 rounded-full border-4 border-transparent loader-ring"></div>
            </div>
            <p id="loadingText" class="mt-4 text-sm font-medium tracking-wide text-indigo-400 animate-pulse">Processing security...</p>
        </div>

        <div id="signupCard" class="w-full glass-card rounded-2xl p-8 page-transition">
            <div class="text-center mb-8">
                <h2 class="text-3xl font-bold tracking-tight bg-gradient-to-r from-white to-slate-400 bg-clip-text text-transparent">Create Account</h2>
                <p class="text-sm text-slate-400 mt-2">Get started with your professional dashboard</p>
            </div>

            <div class="grid grid-cols-2 gap-4 mb-6">
                <button onclick="simulateSocialAuth('Google')" class="flex items-center justify-center gap-2 py-2.5 px-4 rounded-xl bg-white/5 hover:bg-white/10 border border-white/5 hover:border-white/10 transition-all duration-200 active:scale-95 text-sm font-medium">
                    <img src="https://www.svgrepo.com/show/475656/google-color.svg" class="w-4 h-4" alt="Google"> Google
                </button>
                <button onclick="simulateSocialAuth('Facebook')" class="flex items-center justify-center gap-2 py-2.5 px-4 rounded-xl bg-white/5 hover:bg-white/10 border border-white/5 hover:border-white/10 transition-all duration-200 active:scale-95 text-sm font-medium">
                    <i class="fa-brands fa-facebook text-blue-500 text-base"></i> Facebook
                </button>
            </div>

            <div class="relative flex py-2 items-center mb-6">
                <div class="flex-grow border-t border-white/10"></div>
                <span class="flex-shrink mx-4 text-xs uppercase tracking-widest text-slate-500 font-semibold">Or continue with</span>
                <div class="flex-grow border-t border-white/10"></div>
            </div>

            <form onsubmit="handleSignup(event)" class="space-y-4">
                <div>
                    <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-1.5">Full Name</label>
                    <div class="relative">
                        <i class="fa-regular fa-user absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 text-sm"></i>
                        <input type="text" id="signupName" required class="w-full pl-11 pr-4 py-3 bg-slate-950/40 border border-white/10 rounded-xl focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 outline-none transition-all text-sm placeholder:text-slate-600" placeholder="John Doe">
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-1.5">Email Address</label>
                    <div class="relative">
                        <i class="fa-regular fa-envelope absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 text-sm"></i>
                        <input type="email" id="signupEmail" required class="w-full pl-11 pr-4 py-3 bg-slate-950/40 border border-white/10 rounded-xl focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 outline-none transition-all text-sm placeholder:text-slate-600" placeholder="name@company.com">
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-1.5">Password</label>
                    <div class="relative">
                        <i class="fa-solid fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 text-sm"></i>
                        <input type="password" id="signupPassword" required class="w-full pl-11 pr-4 py-3 bg-slate-950/40 border border-white/10 rounded-xl focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 outline-none transition-all text-sm placeholder:text-slate-600" placeholder="••••••••">
                    </div>
                </div>

                <button type="submit" class="w-full mt-2 py-3 bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-500 hover:to-purple-500 font-semibold rounded-xl shadow-lg shadow-indigo-600/20 active:scale-[0.98] transition-all duration-150 text-sm tracking-wide">
                    Create Free Account
                </button>
            </form>

            <p class="text-center text-sm text-slate-400 mt-6">
                Already have an account? 
                <button onclick="switchCard('login')" class="text-indigo-400 hover:text-indigo-300 font-medium hover:underline focus:outline-none ml-1">Log in</button>
            </p>
        </div>

        <div id="loginCard" class="w-full glass-card rounded-2xl p-8 page-transition hidden-card">
            <div class="text-center mb-8">
                <h2 class="text-3xl font-bold tracking-tight bg-gradient-to-r from-white to-slate-400 bg-clip-text text-transparent">Welcome Back</h2>
                <p class="text-sm text-slate-400 mt-2">Please enter your details to sign in</p>
            </div>

            <div class="grid grid-cols-2 gap-4 mb-6">
                <button onclick="simulateSocialAuth('Google')" class="flex items-center justify-center gap-2 py-2.5 px-4 rounded-xl bg-white/5 hover:bg-white/10 border border-white/5 hover:border-white/10 transition-all duration-200 active:scale-95 text-sm font-medium">
                    <img src="https://www.svgrepo.com/show/475656/google-color.svg" class="w-4 h-4" alt="Google"> Google
                </button>
                <button onclick="simulateSocialAuth('Facebook')" class="flex items-center justify-center gap-2 py-2.5 px-4 rounded-xl bg-white/5 hover:bg-white/10 border border-white/5 hover:border-white/10 transition-all duration-200 active:scale-95 text-sm font-medium">
                    <i class="fa-brands fa-facebook text-blue-500 text-base"></i> Facebook
                </button>
            </div>

            <div class="relative flex py-2 items-center mb-6">
                <div class="flex-grow border-t border-white/10"></div>
                <span class="flex-shrink mx-4 text-xs uppercase tracking-widest text-slate-500 font-semibold">Or security login</span>
                <div class="flex-grow border-t border-white/10"></div>
            </div>

            <form onsubmit="handleLogin(event)" class="space-y-4">
                <div>
                    <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-1.5">Email Address</label>
                    <div class="relative">
                        <i class="fa-regular fa-envelope absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 text-sm"></i>
                        <input type="email" id="loginEmail" required class="w-full pl-11 pr-4 py-3 bg-slate-950/40 border border-white/10 rounded-xl focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 outline-none transition-all text-sm placeholder:text-slate-600" placeholder="name@company.com">
                    </div>
                </div>
                <div>
                    <div class="flex justify-between items-center mb-1.5">
                        <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400">Password</label>
                        <a href="#" class="text-xs text-indigo-400 hover:underline">Forgot?</a>
                    </div>
                    <div class="relative">
                        <i class="fa-solid fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 text-sm"></i>
                        <input type="password" id="loginPassword" required class="w-full pl-11 pr-4 py-3 bg-slate-950/40 border border-white/10 rounded-xl focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 outline-none transition-all text-sm placeholder:text-slate-600" placeholder="••••••••">
                    </div>
                </div>

                <button type="submit" class="w-full mt-2 py-3 bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-500 hover:to-purple-500 font-semibold rounded-xl shadow-lg shadow-indigo-600/20 active:scale-[0.98] transition-all duration-150 text-sm tracking-wide">
                    Sign In
                </button>
            </form>

            <p class="text-center text-sm text-slate-400 mt-6">
                Don't have an account? 
                <button onclick="switchCard('signup')" class="text-indigo-400 hover:text-indigo-300 font-medium hover:underline focus:outline-none ml-1">Sign up</button>
            </p>
        </div>

    </div>

    <script>
        const signupCard = document.getElementById('signupCard');
        const loginCard = document.getElementById('loginCard');
        const loadingOverlay = document.getElementById('loadingOverlay');
        const loadingText = document.getElementById('loadingText');

        // Backend URL definition
        const BACKEND_URL = 'http://localhost:5000/api';

        // Toggle between UI views
        function switchCard(target) {
            if (target === 'login') {
                signupCard.classList.add('hidden-card');
                loginCard.classList.remove('hidden-card');
            } else {
                loginCard.classList.add('hidden-card');
                signupCard.classList.remove('hidden-card');
            }
        }

        // --- REAL BACKEND SIGNUP CONNECTION ---
        async function handleSignup(e) {
            e.preventDefault();
            
            const name = document.getElementById('signupName').value;
            const email = document.getElementById('signupEmail').value;
            const password = document.getElementById('signupPassword').value;

            // Show Loading Overlay
            loadingText.innerText = "Creating your account...";
            loadingOverlay.classList.remove('opacity-0', 'pointer-events-none');

            try {
                const response = await fetch(`${BACKEND_URL}/signup`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    loadingText.innerText = data.msg || "Account Created! Redirecting...";
                    setTimeout(() => {
                        loadingOverlay.classList.add('opacity-0', 'pointer-events-none');
                        switchCard('login');
                        // Form fields reset
                        document.getElementById('signupName').value = '';
                        document.getElementById('signupEmail').value = '';
                        document.getElementById('signupPassword').value = '';
                    }, 1500);
                } else {
                    loadingOverlay.classList.add('opacity-0', 'pointer-events-none');
                    alert(data.msg || "Signup error!");
                }
            } catch (error) {
                loadingOverlay.classList.add('opacity-0', 'pointer-events-none');
                alert("Backend Server Not Connected");
            }
        }

        // --- REAL BACKEND LOGIN CONNECTION ---
        async function handleLogin(e) {
            e.preventDefault();

            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;

            loadingText.innerText = "Authenticating secure session...";
            loadingOverlay.classList.remove('opacity-0', 'pointer-events-none');

            try {
                const response = await fetch(`${BACKEND_URL}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    loadingText.innerText = "Access Granted!";
                    
                    // Safe Check: Saving token and user data to localStorage
                    if (data.token) {
                        localStorage.setItem('token', data.token);
                    }
                    if (data.user) {
                        localStorage.setItem('user', JSON.stringify(data.user));
                    } else {
                        // Fallback fallback agar backend object format thoda different bhej raha ho
                        localStorage.setItem('user', JSON.stringify({ name: "User", email: email }));
                    }
                    
                    setTimeout(() => {
                        loadingOverlay.classList.add('opacity-0', 'pointer-events-none');
                        // Redirecting to home file
                        window.location.replace('clothing-swap-and-exchange.html'); 
                    }, 1000);
                } else {
                    loadingOverlay.classList.add('opacity-0', 'pointer-events-none');
                    alert(data.msg || "Invalid credentials!");
                }
            } catch (error) {
                loadingOverlay.classList.add('opacity-0', 'pointer-events-none');
                alert("Backend Server Connection Error!");
            }
        }

        // Dummy Alert for Social Platforms
        function simulateSocialAuth(platform) {
            loadingText.innerText = `Connecting to ${platform}...`;
            loadingOverlay.classList.remove('opacity-0', 'pointer-events-none');
            
            setTimeout(() => {
                loadingOverlay.classList.add('opacity-0', 'pointer-events-none');
                alert(`Simulated callback success from ${platform}! Live integration triggers standard OAuth.`);
            }, 1500);
        }
    </script>
</body>
</html>
